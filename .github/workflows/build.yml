name: Shared Build Workflow

on:
  workflow_call:
    inputs:
      build-target:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: echo "Building ${{ inputs.build-target }}"

      - name: Run tests
        run: echo "Running tests for ${{ inputs.build-target }}"
