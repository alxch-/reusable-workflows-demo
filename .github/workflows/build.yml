name: Shared Build Workflow

on:
  workflow_call:
    inputs:
      build-target:
        required: true
        type: string
    secrets:
      DD_API_KEY:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show resolved job context values
        run: |
          echo "job.workflow_ref        = ${{ job.workflow_ref }}"
          echo "job.workflow_sha        = ${{ job.workflow_sha }}"
          echo "job.workflow_repository = ${{ job.workflow_repository }}"
          echo "job.workflow_file_path  = ${{ job.workflow_file_path }}"
          echo "github.repository       = ${{ github.repository }}"

      - name: Tag reusable workflow metadata in CI Visibility
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}
          DATADOG_SITE: datadoghq.com
        run: |
          npx @datadog/datadog-ci tag --level job \
            --tags "reusable_workflow.ref:${{ job.workflow_ref }}" \
            --tags "reusable_workflow.sha:${{ job.workflow_sha }}" \
            --tags "reusable_workflow.repo:${{ job.workflow_repository }}" \
            --tags "reusable_workflow.file_path:${{ job.workflow_file_path }}" \
            --tags "reusable_workflow.caller_repo:${{ github.repository }}" \
            --tags "reusable_workflow.input.build_target:${{ inputs.build-target }}"

      - name: Build
        run: |
          echo "Building ${{ inputs.build-target }}"
          sleep 30

      - name: Run tests
        run: |
          echo "Running tests for ${{ inputs.build-target }}"
          sleep 30
